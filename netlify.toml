# ─────────────────────────────────────────────────────────────────
#  Courseific Sessions · Netlify Configuration
# ─────────────────────────────────────────────────────────────────

[build]
  publish = "."           # repo root IS the engagement-platform folder
  command = ""            # no build step — pure static

# ── Security headers (applied to all routes) ─────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self' https://*.supabase.co https://cdn.jsdelivr.net https://ui-avatars.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' https://ui-avatars.com data:;"

# ── Keep admin out of search engines ─────────────────────────────
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ── SPA-style fallback (optional — useful if you add routing later)
[[redirects]]
  from   = "/app/*"
  to     = "/index.html"
  status = 200
